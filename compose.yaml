networks:
  network:
    name: network_${NAME_PROJECT}

services:
  nginx:
    container_name: nginx_${NAME_PROJECT}
    image: nginx
    ports:
      - 80:80
    volumes:
      #      - ./vhost.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/templates/:/etc/nginx/templates
      - ./www:/etc/nginx/html
    networks:
      - network
    depends_on:
      - php
      - mysql
    env_file:
      - ./.env
    environment:
      - TZ=Europe/Moscow
  php:
    container_name: php_${NAME_PROJECT}
    build: ./images/php
    volumes:
      - ./www:/etc/nginx/html
      - ./images/php/php.ini:/usr/local/etc/php/conf.d/defaults.ini
      - ./images/php/phpcs.xml:/usr/local/etc/phpcs.xml
      - ./www:/var/log/php
    networks:
      - network
    depends_on:
      - mysql
    environment:
      - TZ=Europe/Moscow
  mysql:
    container_name: mysql_${NAME_PROJECT}
    image: mysql
    ports:
      - 3306:3306
    volumes:
      - ./mysql-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_INITDB_ARGS=--default-time-zone='+03:00'
      - TZ=Europe/Moscow
    networks:
      - network
  composer:
    image: composer:latest
    container_name: composer_${NAME_PROJECT}
    volumes:
      - ./www:/app
    working_dir: /app
    networks:
      - network
    environment:
      - TZ=Europe/Moscow